services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: everrich_rpg
      POSTGRES_USER: everrich
      POSTGRES_PASSWORD: everrich_dev
    ports:
      - "5432:5432"
    volumes:
      - everrich-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U everrich -d everrich_rpg"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__GameDatabase: Host=database;Port=5432;Database=everrich_rpg;Username=everrich;Password=everrich_dev
      Database__Provider: PostgreSql
      Database__ApplyMigrations: "true"
      Cors__AllowedOrigins__0: http://127.0.0.1:5173
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "5080:8080"
    depends_on:
      database:
        condition: service_healthy

volumes:
  everrich-postgres:
