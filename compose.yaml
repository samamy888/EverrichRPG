services:
  database:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: everrich_rpg
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-everrich_dev}
    ports:
      - "3306:3306"
    volumes:
      - everrich-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__GameDatabase: Server=database;Port=3306;Database=everrich_rpg;User=root;Password=${MYSQL_ROOT_PASSWORD:-everrich_dev};TreatTinyAsBoolean=true
      Database__Provider: MySql
      Database__ApplyMigrations: "true"
      Cors__AllowedOrigins__0: http://127.0.0.1:5173
      Cors__AllowedOrigins__1: http://localhost:5173
    ports:
      - "5080:8080"
    depends_on:
      database:
        condition: service_healthy

volumes:
  everrich-mysql:
