name: Build IIS package

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Frontend API base URL. Leave empty to use /api/v1."
        required: false
        default: ""

jobs:
  build-iis-package:
    name: Build frontend and API package
    runs-on: windows-latest

    env:
      CONFIGURATION: Release
      FRONTEND_PACKAGE_DIR: artifacts/iis-package/frontend
      API_PACKAGE_DIR: artifacts/iis-package/api
      INPUT_API_BASE_URL: ${{ github.event.inputs.api_base_url || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore frontend dependencies
        run: npm ci

      - name: Verify Tiled maps
        run: npm run tiled:verify

      - name: Test frontend
        run: npm test

      - name: Build frontend for IIS
        shell: pwsh
        run: |
          if ($env:INPUT_API_BASE_URL) {
            $env:VITE_API_BASE_URL = $env:INPUT_API_BASE_URL
          }
          npm run build:iis

      - name: Restore API dependencies
        run: dotnet restore server/EverrichRPG.slnx

      - name: Test API
        run: dotnet test server/EverrichRPG.slnx --configuration $env:CONFIGURATION --no-restore

      - name: Publish API for IIS
        run: >
          dotnet publish server/src/EverrichRPG.Api/EverrichRPG.Api.csproj
          --configuration $env:CONFIGURATION
          --no-restore
          --output $env:API_PACKAGE_DIR

      - name: Assemble IIS package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:FRONTEND_PACKAGE_DIR | Out-Null
          Copy-Item -Path dist\* -Destination $env:FRONTEND_PACKAGE_DIR -Recurse -Force

          @"
          # EverrichRPG IIS Package

          Build: $env:GITHUB_RUN_NUMBER
          Commit: $env:GITHUB_SHA

          ## Package contents

          - frontend/: Vite static site for IIS.
          - api/: ASP.NET Core API published output for IIS / ASP.NET Core Hosting Bundle.

          ## Suggested IIS layout

          - Frontend site physical path: frontend/
          - API application physical path: api/
          - If API is hosted under the same domain, map it as /api or use URL Rewrite reverse proxy.
          - If API is hosted elsewhere, rerun this workflow manually with api_base_url set to the full API base URL, e.g. https://example.com/api/v1.

          ## Server prerequisites

          - IIS URL Rewrite Module for frontend SPA fallback.
          - ASP.NET Core Hosting Bundle compatible with the SDK/runtime in global.json.
          - MySQL production database. See docs/PRODUCTION_DATABASE.md.
          - Database connection string configured through IIS environment variables, GitHub secret IIS_DATABASE_CONNECTION_STRING, or appsettings.Production.json.
          "@ | Set-Content -Path artifacts\iis-package\README.md -Encoding UTF8

      - name: Upload IIS package
        uses: actions/upload-artifact@v4
        with:
          name: everrich-rpg-iis-package
          path: artifacts/iis-package
          if-no-files-found: error
          retention-days: 14
