name: Azure IIS CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Frontend API base URL. Leave empty to use /api/v1."
        required: false
        default: ""

concurrency:
  group: azure-iis-production
  cancel-in-progress: false

jobs:
  build:
    name: Build and test
    runs-on: windows-latest

    env:
      CONFIGURATION: Release
      PACKAGE_ROOT: artifacts/iis-package
      FRONTEND_PACKAGE_DIR: artifacts/iis-package/frontend
      API_PACKAGE_DIR: artifacts/iis-package/api
      INPUT_API_BASE_URL: ${{ github.event.inputs.api_base_url || vars.PRODUCTION_API_BASE_URL || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore frontend dependencies
        run: npm ci

      - name: Verify Tiled maps
        run: npm run tiled:verify

      - name: Test frontend
        run: npm test

      - name: Build frontend for IIS
        shell: pwsh
        run: |
          if ($env:INPUT_API_BASE_URL) {
            $env:VITE_API_BASE_URL = $env:INPUT_API_BASE_URL
          }
          npm run build:iis

      - name: Restore API dependencies
        run: dotnet restore server/EverrichRPG.slnx

      - name: Test API
        run: dotnet test server/EverrichRPG.slnx --configuration $env:CONFIGURATION --no-restore

      - name: Publish API for IIS
        run: >
          dotnet publish server/src/EverrichRPG.Api/EverrichRPG.Api.csproj
          --configuration $env:CONFIGURATION
          --no-restore
          --output $env:API_PACKAGE_DIR

      - name: Assemble frontend package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:FRONTEND_PACKAGE_DIR | Out-Null
          Copy-Item -Path dist\* -Destination $env:FRONTEND_PACKAGE_DIR -Recurse -Force

          @"
          Build=$env:GITHUB_RUN_NUMBER
          Commit=$env:GITHUB_SHA
          ApiBaseUrl=$env:INPUT_API_BASE_URL
          "@ | Set-Content -Path "$env:PACKAGE_ROOT\build-info.txt" -Encoding UTF8

      - name: Upload deployment package
        uses: actions/upload-artifact@v4
        with:
          name: everrich-rpg-iis-deploy
          path: artifacts/iis-package
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Azure IIS
    needs: build
    runs-on:
      - self-hosted
      - windows
      - iis
    environment:
      name: production

    env:
      FRONTEND_PATH: ${{ vars.IIS_FRONTEND_PATH }}
      API_PATH: ${{ vars.IIS_API_PATH }}
      API_DATA_PATH: ${{ vars.IIS_API_DATA_PATH || 'D:\EverrichRPGData' }}
      FRONTEND_APP_POOL: ${{ vars.IIS_FRONTEND_APP_POOL }}
      API_APP_POOL: ${{ vars.IIS_API_APP_POOL }}
      INTERNAL_HEALTH_URL: ${{ vars.IIS_INTERNAL_HEALTH_URL || 'http://localhost:5080/api/v1/health/ready' }}
      PUBLIC_HEALTH_URL: ${{ vars.IIS_HEALTH_URL }}
      REQUIRE_PUBLIC_HEALTH: ${{ vars.IIS_REQUIRE_PUBLIC_HEALTH || 'false' }}
      BACKUP_ROOT: ${{ vars.IIS_BACKUP_ROOT }}
      DATABASE_PROVIDER: ${{ vars.IIS_DATABASE_PROVIDER || 'PostgreSql' }}
      DATABASE_CONNECTION_STRING: ${{ secrets.IIS_DATABASE_CONNECTION_STRING }}

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v4
        with:
          name: everrich-rpg-iis-deploy
          path: deploy-package

      - name: Validate IIS deployment variables
        shell: powershell
        run: |
          $required = @(
            "FRONTEND_PATH",
            "API_PATH",
            "API_APP_POOL"
          )

          foreach ($name in $required) {
            if (-not [Environment]::GetEnvironmentVariable($name)) {
              throw "Missing required GitHub environment variable: $name"
            }
          }

          if (-not $env:BACKUP_ROOT) {
            $env:BACKUP_ROOT = Join-Path $env:RUNNER_TEMP "everrich-rpg-backups"
            "BACKUP_ROOT=$env:BACKUP_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          if (-not $env:INTERNAL_HEALTH_URL) {
            "INTERNAL_HEALTH_URL=http://localhost:5080/api/v1/health/ready" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

          if (-not $env:DATABASE_CONNECTION_STRING) {
            Write-Warning "IIS_DATABASE_CONNECTION_STRING is not configured. API will use packaged appsettings."
          }

      - name: Stop IIS app pools
        shell: powershell
        run: |
          $appcmd = "$env:windir\System32\inetsrv\appcmd.exe"
          if (-not (Test-Path $appcmd)) {
            throw "appcmd.exe was not found. Make sure this self-hosted runner is installed on the IIS server."
          }

          if ($env:FRONTEND_APP_POOL) {
            & $appcmd stop apppool /apppool.name:"$env:FRONTEND_APP_POOL"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Frontend app pool was not stopped. It may already be stopped."
              $global:LASTEXITCODE = 0
            }
          }
          & $appcmd stop apppool /apppool.name:"$env:API_APP_POOL"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "API app pool was not stopped. It may already be stopped."
            $global:LASTEXITCODE = 0
          }

      - name: Backup current IIS folders
        shell: powershell
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $backupPath = Join-Path $env:BACKUP_ROOT $timestamp
          New-Item -ItemType Directory -Force $backupPath | Out-Null

          if (Test-Path $env:FRONTEND_PATH) {
            robocopy $env:FRONTEND_PATH (Join-Path $backupPath "frontend") /MIR /R:2 /W:2 /NFL /NDL /NP
            if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          }

          if (Test-Path $env:API_PATH) {
            robocopy $env:API_PATH (Join-Path $backupPath "api") /MIR /R:2 /W:2 /NFL /NDL /NP
            if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 }
          }

          "BACKUP_PATH=$backupPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Deploy package to IIS folders
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force $env:FRONTEND_PATH | Out-Null
          New-Item -ItemType Directory -Force $env:API_PATH | Out-Null
          New-Item -ItemType Directory -Force $env:API_DATA_PATH | Out-Null

          $appPoolIdentity = "IIS AppPool\$($env:API_APP_POOL)"
          $grant = "$($appPoolIdentity):(OI)(CI)M"
          & icacls $env:API_DATA_PATH /grant $grant | Write-Host
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Failed to grant modify permission on $env:API_DATA_PATH to $appPoolIdentity. Falling back to IIS_IUSRS."
            $global:LASTEXITCODE = 0
            & icacls $env:API_DATA_PATH /grant "IIS_IUSRS:(OI)(CI)M" | Write-Host
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to grant modify permission on $env:API_DATA_PATH to IIS_IUSRS."
            }
          }

          $appOfflinePath = Join-Path $env:API_PATH "app_offline.htm"
          @"
          <html>
            <head><title>Everrich RPG API is updating</title></head>
            <body>Everrich RPG API is updating. Please retry shortly.</body>
          </html>
          "@ | Set-Content -Path $appOfflinePath -Encoding UTF8

          Write-Host "app_offline.htm created. Waiting for ASP.NET Core process to release locked files..."
          Start-Sleep -Seconds 12

          robocopy deploy-package\frontend $env:FRONTEND_PATH /MIR /R:3 /W:3 /NFL /NDL /NP
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 } else { exit $LASTEXITCODE }

          robocopy deploy-package\api $env:API_PATH /MIR /XF app_offline.htm /R:10 /W:5 /NFL /NDL /NP
          if ($LASTEXITCODE -le 7) { $global:LASTEXITCODE = 0 } else { exit $LASTEXITCODE }

          if (Test-Path $appOfflinePath) {
            Remove-Item -LiteralPath $appOfflinePath -Force
          }

      - name: Configure production database
        shell: powershell
        run: |
          if (-not $env:DATABASE_CONNECTION_STRING) {
            Write-Warning "Skipping appsettings.Production.json because IIS_DATABASE_CONNECTION_STRING is not configured."
            exit 0
          }

          $settings = [ordered]@{
            ConnectionStrings = [ordered]@{
              GameDatabase = $env:DATABASE_CONNECTION_STRING
            }
            Database = [ordered]@{
              Provider = $env:DATABASE_PROVIDER
              ApplyMigrations = $true
            }
          }

          $settings |
            ConvertTo-Json -Depth 5 |
            Set-Content -Path (Join-Path $env:API_PATH "appsettings.Production.json") -Encoding UTF8

          Write-Host "Production database settings were written to appsettings.Production.json."

      - name: Start IIS app pools
        if: always()
        shell: powershell
        run: |
          $appOfflinePath = Join-Path $env:API_PATH "app_offline.htm"
          if (Test-Path $appOfflinePath) {
            Remove-Item -LiteralPath $appOfflinePath -Force
          }

          $appcmd = "$env:windir\System32\inetsrv\appcmd.exe"
          if (Test-Path $appcmd) {
            & $appcmd start apppool /apppool.name:"$env:API_APP_POOL"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "API app pool was not started. Please check IIS app pool state."
              $global:LASTEXITCODE = 0
            }
            if ($env:FRONTEND_APP_POOL) {
              & $appcmd start apppool /apppool.name:"$env:FRONTEND_APP_POOL"
              if ($LASTEXITCODE -ne 0) {
                Write-Host "Frontend app pool was not started. Please check IIS app pool state."
                $global:LASTEXITCODE = 0
              }
            }
          }

      - name: Check internal API health
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $maxAttempts = 10
          $delaySeconds = 6
          $lastError = $null

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Write-Host ("Internal health check attempt {0}/{1}: {2}" -f $attempt, $maxAttempts, $env:INTERNAL_HEALTH_URL)
              $response = Invoke-WebRequest -Uri $env:INTERNAL_HEALTH_URL -UseBasicParsing -TimeoutSec 30

              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) {
                Write-Host "Internal health check passed with status code $($response.StatusCode)."
                exit 0
              }

              $lastError = "Internal health check returned status code $($response.StatusCode)."
            }
            catch {
              $lastError = $_.Exception.Message
              Write-Host "Internal health check failed: $lastError"
            }

            if ($attempt -lt $maxAttempts) {
              Start-Sleep -Seconds $delaySeconds
            }
          }

          $appcmd = "$env:windir\System32\inetsrv\appcmd.exe"
          if (Test-Path $appcmd) {
            Write-Host "IIS app pools:"
            & $appcmd list apppool
            Write-Host "IIS sites:"
            & $appcmd list site
          }

          Write-Host "Listening TCP ports:"
          netstat -ano | Select-String -Pattern "LISTENING|:5080"

          throw "Internal API health check did not pass after $maxAttempts attempts. Last error: $lastError. Check API IIS binding, port 5080, API app pool, and IIS_INTERNAL_HEALTH_URL."

      - name: Check public health endpoint
        if: ${{ vars.IIS_HEALTH_URL != '' }}
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $maxAttempts = 5
          $delaySeconds = 6
          $lastError = $null

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Write-Host ("Public health check attempt {0}/{1}: {2}" -f $attempt, $maxAttempts, $env:PUBLIC_HEALTH_URL)
              $response = Invoke-WebRequest -Uri $env:PUBLIC_HEALTH_URL -UseBasicParsing -TimeoutSec 30

              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) {
                Write-Host "Public health check passed with status code $($response.StatusCode)."
                exit 0
              }

              $lastError = "Public health check returned status code $($response.StatusCode)."
            }
            catch {
              $lastError = $_.Exception.Message
              Write-Host "Public health check failed: $lastError"
            }

            if ($attempt -lt $maxAttempts) {
              Start-Sleep -Seconds $delaySeconds
            }
          }

          $message = "Public health check did not pass after $maxAttempts attempts. Last error: $lastError. Check URL Rewrite, ARR proxy, HTTPS binding, firewall/NSG, and IIS_HEALTH_URL."
          if ($env:REQUIRE_PUBLIC_HEALTH -eq "true") {
            throw $message
          }

          Write-Warning $message

      - name: Check public API smoke endpoints
        if: ${{ vars.IIS_HEALTH_URL != '' }}
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $healthUri = [Uri]$env:PUBLIC_HEALTH_URL
          $apiBaseUrl = $healthUri.AbsoluteUri -replace "/health(/ready)?$", ""
          $endpoints = @(
            "$apiBaseUrl/shops/catalog",
            "$apiBaseUrl/travelers/random?count=3"
          )

          foreach ($endpoint in $endpoints) {
            Write-Host "API smoke check: $endpoint"
            try {
              $response = Invoke-WebRequest -Uri $endpoint -UseBasicParsing -TimeoutSec 30
              if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 300) {
                throw "Unexpected status code $($response.StatusCode)."
              }
              if (-not $response.Content -or $response.Content.Length -lt 10) {
                throw "Response body was empty or too short."
              }
            }
            catch {
              throw "API smoke check failed for $endpoint. Last error: $($_.Exception.Message)"
            }
          }

      - name: Deployment summary
        shell: powershell
        run: |
          "## Azure IIS deployment" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "- Frontend path: ``$env:FRONTEND_PATH``" >> $env:GITHUB_STEP_SUMMARY
          "- API path: ``$env:API_PATH``" >> $env:GITHUB_STEP_SUMMARY
          "- Backup path: ``$env:BACKUP_PATH``" >> $env:GITHUB_STEP_SUMMARY
          "- Internal health URL: ``$env:INTERNAL_HEALTH_URL``" >> $env:GITHUB_STEP_SUMMARY
          "- Public health URL: ``$env:PUBLIC_HEALTH_URL``" >> $env:GITHUB_STEP_SUMMARY
